<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>

    <link rel="stylesheet" href="./styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <img src="./images/logo.png" alt="Logo do site">
    </header>

    <main>
        <div class="title">
            <p><img src="./images/icons/arrowLeft.png" alt="Icone de seta para voltar"> Voltar</p>

            <h1>Compras da semana</h1>
        </div>

        <div class="submit">
            <input type="text" placeholder="Adicione um novo item" id="item">

            <button type="button">Adicionar Item</button>
        </div>

        <div class="itens">
            <div class="item">
                <div class="left">
                    <input type="checkbox" name="checkbox" id="checkbox">

                    <p>Pão de Forma</p>
                </div>

                <img src="./images/icons/trashCan.png" alt="">
            </div>

            <div class="item">
                <div class="left">
                    <input type="checkbox" name="checkbox" id="checkbox">

                    <p>Pão de Forma</p>
                </div>

                <img src="./images/icons/trashCan.png" alt="">
            </div>

            <div class="item">
                <div class="left">
                    <input type="checkbox" name="checkbox" id="checkbox">

                    <p>Pão de Forma</p>
                </div>

                <img src="./images/icons/trashCan.png" alt="">
            </div>

            <div class="item">
                <div class="left">
                    <input type="checkbox" name="checkbox" id="checkbox">

                    <p>Pão de Forma</p>
                </div>

                <img src="./images/icons/trashCan.png" alt="">
            </div>
        </div>

        <div class="alert">
            <div class="left">
                <img src="./images/icons/alert.png" alt="Icone de alerta">
                <p>O item foi removido da lista</p>
            </div>

            <img src="./images/icons/x.png" alt="Icone de x para excluir item da lista">
        </div>
    </main>
</body>
</html>
